name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  build:
    permissions:
      id-token: write
      attestations: write

    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
        include:
          - target: aarch64-apple-darwin
            system: aarch64-darwin
          - target: x86_64-apple-darwin
            system: x86_64-darwin
      fail-fast: false

    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # ratchet:cachix/install-nix-action@v31.10.5

      - name: Build
        id: build
        run: |
          out_path="$(nix build -L --show-trace --print-out-paths '.#packages.${{ matrix.system }}.morlana')"
          echo "out_path=$out_path" >> "$GITHUB_OUTPUT"

      - name: Push to Cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # ratchet:cachix/cachix-action@v17
        with:
          name: ryanccn
          pathsToPush: "${{ steps.build.outputs.out_path }}"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # ratchet:actions/attest-build-provenance@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          subject-path: ./result/bin/morlana

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          if-no-files-found: "error"
          name: morlana-${{ matrix.system }}
          path: ./result/bin/morlana
